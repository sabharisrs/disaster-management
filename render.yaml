services:
  - name: disaster-help-platform
    type: web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        scope: secret
      - key: DATABASE_URL
        scope: secret
